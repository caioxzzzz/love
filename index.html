  <title>💖 Para Você, Meu Amor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    #msg {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      animation: fadeIn 3s ease forwards;
      opacity: 0;
    }
    #msg p {
      color: #ff4fd8;
      font-size: clamp(13px, 2vw, 17px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-family: 'Trebuchet MS', Tahoma, sans-serif;
      text-shadow: 0 0 10px #ff4fd8, 0 0 28px #ff20a0, 0 0 55px #aa006688;
      animation: pulse-text 3s ease-in-out infinite;
    }
    #msg small {
      display: block;
      margin-top: 5px;
      color: rgba(255,150,220,0.45);
      font-size: clamp(10px, 1.3vw, 12px);
      letter-spacing: 0.08em;
      font-family: sans-serif;
    }
    @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
    @keyframes pulse-text { 0%,100%{opacity:.85} 50%{opacity:1} }
  </style>
</head>

let photoImg = new Image();
let photoLoaded = false;
photoImg.onload = () => { photoLoaded = true; };
photoImg.src = PHOTO_SRC;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

const NUM = 340, SPARKS = 80;
let particles = [], sparks = [], t = 0;

function hx(a, s) { return 16 * Math.pow(Math.sin(a), 3) * s; }
function hy(a, s) { return -(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a))*s; }
function lerp(a, b, k) { return a + (b-a)*k; }

function clampSize() {
  const base = Math.min(canvas.width, canvas.height);
  return (base/80)*(0.85+Math.random()*0.55);
}

function init() {
  const cx = canvas.width/2, cy = canvas.height/2;
  particles = [];
  for (let i = 0; i < NUM; i++) {
    particles.push({
      x: cx+(Math.random()-.5)*canvas.width,
      y: cy+(Math.random()-.5)*canvas.height,
      tx: cx, ty: cy,
      angle: (i/NUM)*Math.PI*2,
      px: Math.random()*Math.PI*2,
      py: Math.random()*Math.PI*2,
      spd: .55+Math.random()*.9,
      alpha: .72+Math.random()*.28,
      size: clampSize(),
      twinkle: 0
    });
  }
  sparks = [];
  for (let i = 0; i < SPARKS; i++) sparks.push(makeSpark(cx, cy));
}

function makeSpark(cx, cy) {
  const ang = Math.random()*Math.PI*2, r = 70+Math.random()*140;
  return {
    x: cx+Math.cos(ang)*r, y: cy+Math.sin(ang)*r,
    vx: (Math.random()-.5)*.7, vy: -.15-Math.random()*.65,
    life: Math.random(), maxLife: .45+Math.random()*.9,
    size: .8+Math.random()*2.5, cx, cy
  };
}

function drawLove(x, y, alpha, size) {
  ctx.save();
  ctx.font = `bold ${size}px 'Trebuchet MS',Tahoma,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const glows = [
    {blur:22,color:`rgba(255,10,110,${alpha*.18})`,scale:1.65},
    {blur:12,color:`rgba(255,79,216,${alpha*.27})`,scale:1.30},
    {blur:5, color:`rgba(255,160,235,${alpha*.38})`,scale:1.10}
  ];
  for (const g of glows) {
    ctx.shadowBlur = g.blur; ctx.shadowColor = g.color; ctx.fillStyle = g.color;
    ctx.save(); ctx.translate(x,y); ctx.scale(g.scale,g.scale); ctx.fillText('LOVE',0,0); ctx.restore();
  }
  ctx.shadowBlur = 0; ctx.fillStyle = `rgba(255,200,240,${alpha})`; ctx.fillText('LOVE',x,y);
  ctx.restore();
}

// Desenha a foto com moldura circular neon
function drawPhoto(cx, cy, pulse) {
  if (!photoLoaded) return;
  const r = Math.min(canvas.width, canvas.height) * 0.11 * pulse;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(photoImg, cx-r, cy-r, r*2, r*2);
  ctx.restore();

  // Anel neon externo
  for (let i = 4; i >= 1; i--) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r + i*3, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,79,216,${0.12*i})`;
    ctx.lineWidth = 8;
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#ff4fd8';
    ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r+2, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(255,200,240,0.85)`;
  ctx.lineWidth = 2.5;
  ctx.shadowBlur = 22;
  ctx.shadowColor = '#ff4fd8';
  ctx.stroke();
  ctx.restore();
}

function frame() {
  requestAnimationFrame(frame);
  t += 0.016;
  ctx.fillStyle = 'rgba(0,0,0,0.17)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width/2, cy = canvas.height/2 + canvas.height*0.02;
  const pulse = 1 + Math.sin(t*2.4)*0.075;
  const scale = Math.min(canvas.width, canvas.height)*0.027*pulse;

  // Bloom central
  const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180*pulse);
  gr.addColorStop(0,'rgba(255,20,130,0.08)');
  gr.addColorStop(.5,'rgba(180,0,90,0.04)');
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.arc(cx, cy, 220, 0, Math.PI*2); ctx.fill();

  // Partículas LOVE
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.tx = cx + hx(p.angle, scale);
    p.ty = cy + hy(p.angle, scale);
    p.x = lerp(p.x, p.tx, 0.055);
    p.y = lerp(p.y, p.ty, 0.055);
    const fx = Math.sin(t*p.spd+p.px)*5.5;
    const fy = Math.cos(t*p.spd+p.py)*5.5;
    if (Math.random()<.012) p.twinkle = .25+Math.random()*.55;
    const a = p.twinkle > 0 ? p.twinkle : p.alpha;
    if (p.twinkle > 0) p.twinkle -= .02;
    drawLove(p.x+fx, p.y+fy, a, p.size);
  }

  // Faíscas
  for (let i = 0; i < sparks.length; i++) {
    const sp = sparks[i];
    sp.x += sp.vx; sp.y += sp.vy; sp.life -= .011;
    if (sp.life <= 0) { sparks[i] = makeSpark(cx, cy); continue; }
    const a = Math.max(0, sp.life/sp.maxLife);
    ctx.save();
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.size*a, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,200,240,${a*.9})`;
    ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(255,80,200,0.7)';
    ctx.fill(); ctx.restore();
  }

  // Foto no centro
  drawPhoto(cx, cy, pulse);
}

init();
frame();
</script>
